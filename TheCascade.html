<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>THE CASCADE</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

html, body {
  width:100%; min-height:100%;
  background:#000;
  overflow-x:hidden;
  font-family:'Cinzel', 'Palatino Linotype', serif;
}

/* ── FIXED AUDIO / VOICE UI ── */
#audioBar {
  position:fixed; bottom:0; left:0; right:0;
  z-index:100;
  background:linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0) 100%);
  padding:1.5rem 2rem 1.2rem;
  display:flex; align-items:center; gap:1.2rem;
  pointer-events:none;
}
#audioBar > * { pointer-events:auto; }

#voiceText {
  flex:1;
  font-size:clamp(0.55rem, 1.3vw, 0.82rem);
  letter-spacing:0.18em;
  color:rgba(210,190,155,0.65);
  font-style:italic;
  line-height:1.8;
  text-transform:uppercase;
  user-select:none;
  min-height:2em;
}

#audioControls {
  display:flex; gap:0.6rem; flex-shrink:0;
}
.aud-btn {
  background:none;
  border:1px solid rgba(130,110,80,0.3);
  color:rgba(180,155,110,0.65);
  font-family:'Cinzel',serif;
  font-size:clamp(0.3rem, 0.8vw, 0.45rem);
  letter-spacing:0.15em;
  padding:0.4em 0.8em;
  cursor:pointer;
  transition:all 0.3s ease;
  text-transform:uppercase;
}
.aud-btn:hover {
  border-color:rgba(180,155,110,0.6);
  color:rgba(220,200,160,0.9);
}

/* ── VIGNETTE EDGES ── */
#vigTop {
  position:fixed; top:0; left:0; right:0; height:180px;
  background:linear-gradient(to bottom, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0) 100%);
  z-index:10; pointer-events:none;
}
#vigBottom {
  position:fixed; bottom:0; left:0; right:0; height:220px;
  background:linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0) 100%);
  z-index:10; pointer-events:none;
}

/* ── TITLE ── */
#titleHeader {
  position:fixed; top:0; left:0; right:0;
  z-index:20; pointer-events:none;
  display:flex; align-items:center; justify-content:center;
  padding-top:clamp(16px,3vh,32px);
}
#titleText {
  font-size:clamp(0.45rem, 1.2vw, 0.7rem);
  letter-spacing:0.55em;
  color:rgba(140,118,85,0.35);
  text-transform:uppercase;
  user-select:none;
}

/* ── FEED CONTAINER ── */
#feed {
  width:100%;
  max-width:100vw;
  padding:0;
  /* columns approach for masonry */
  column-count:1;
  column-gap:0;
}
@media(min-width:700px){
  #feed { column-count:2; }
}
@media(min-width:1100px){
  #feed { column-count:3; }
}

/* ── FEED ITEM ── */
.feed-item {
  break-inside:avoid;
  position:relative;
  overflow:hidden;
  display:block;
  margin:0;
  opacity:0;
  animation:itemReveal 1.2s ease forwards;
  background:#000;
}
@keyframes itemReveal {
  from { opacity:0; transform:scale(1.04); filter:brightness(0); }
  to   { opacity:1; transform:scale(1); filter:brightness(1); }
}

.feed-item canvas {
  display:block;
  width:100%;
  height:auto;
}

/* Label overlay — bottom of each image */
.feed-label {
  position:absolute; bottom:0; left:0; right:0;
  padding:1.5rem 1rem 0.8rem;
  background:linear-gradient(to top, rgba(0,0,0,0.75) 0%, rgba(0,0,0,0) 100%);
  font-size:clamp(0.3rem, 0.7vw, 0.45rem);
  letter-spacing:0.22em;
  color:rgba(180,155,110,0.45);
  text-transform:uppercase;
  opacity:0; transition:opacity 0.4s ease;
}
.feed-item:hover .feed-label { opacity:1; }

/* ── LOAD SENTINEL ── */
#sentinel {
  width:100%; height:1px;
  background:transparent;
}

/* ── NOISE OVERLAY ── */
#noiseCanvas {
  position:fixed; inset:0;
  z-index:5; pointer-events:none;
  opacity:0.028; mix-blend-mode:overlay;
}

/* playlist hardcoded — modal CSS removed */
</style>
</head>
<body>

<canvas id="noiseCanvas"></canvas>
<div id="vigTop"></div>
<div id="vigBottom"></div>

<div id="titleHeader">
  <div id="titleText">Parish of Esoteric Tradition &nbsp;·&nbsp; The Cascade</div>
</div>

<div id="feed"></div>
<div id="sentinel"></div>

<div id="audioBar">
  <div id="voiceText"></div>
  <div id="audioControls">
    <button class="aud-btn" id="btnVoice" onclick="toggleVoice()">Voice: On</button>
    <button class="aud-btn" id="btnMusic" onclick="toggleMusic()">Music: Off</button>
    <button class="aud-btn" onclick="showMusicModal()" title="Next track">&#9834; Next</button>
  </div>
</div>

<!-- playlist hardcoded — no modal needed -->

<script>
'use strict';

// ═══════════════════════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════════════════════
var GH_REPO   = 'matronthorn/Horror-assets';
var GH_BRANCH = 'main';
var GH_PATH   = 'feed';  // subfolder in repo

var DISTORT_PRESETS = [
  'void_transmission','entity_contact','noir_signal',
  'blood_document','acid_dream','silent_archive',
  'crt_tv','emulsion','mirror_prism','wave_liquid','glitch_stripes',
];
var BLEND_MODES = ['screen','overlay','hard-light','multiply','difference','color-dodge','luminosity'];
var RED_GRADES  = ['void_purple','blood_red','noir_cyan','acid_green','thermal'];

// ═══════════════════════════════════════════════════════════════
// ENTROPY ENGINE — apocalyptic / satanic register
// ═══════════════════════════════════════════════════════════════
var ENTROPY = {
  POOLS:{
    subjects:['the end','what comes after','the last transmission','the signal at the edge',
      'the beast beneath the signal','the void','something ancient and patient',
      'the frequency of the final hour','the architect of ruin','the darkness at the threshold',
      'the congregation of the last night','what the fire reveals','the breaking of the seal',
      'the appointed hour','the obliteration of what was promised','Nyxthral',
      'the Simulacra','the Abysscape','the Tempter of the Desert Shade',
      'the last monument','what devours from within'],
    verbs:['is already here','has been here since before your name',
      'has no mercy for the unprepared','was written before your birth',
      'cannot be bargained with','is consuming the last light',
      'watches from the architecture of your fear',
      'has entered through the door you left open',
      'was summoned by everything you refused to become',
      'speaks in the frequency beneath your prayers',
      'feeds on the distance between what you are and what you feared',
      'was always the destination','has always been patient',
      'grows stronger in the silence between your thoughts'],
    objects:['the faithful','the last age','the illusion of safety',
      'the architecture of belief','the light you held onto',
      'the covenant you forgot','the fire you thought was warmth',
      'the threshold between what was and what comes',
      'the congregation of the abandoned','the wound that never closed',
      'the name you cannot speak','the signal you cannot unhear',
      'the mark already on you','the door already open'],
    closings:['there is no after','the archive is complete',
      'the transmission has already been received',
      'what was foretold cannot be unwritten',
      'the congregation gathers whether you attend or not',
      'the seal is broken','the frequency persists beyond the ending',
      'Áltharós anticipated this','the void does not mourn',
      'the Forsakéon was always the destination',
      'the last monument was never for the living',
      'the darkness did not come for you — you came for it'],
  },
  TEMPLATES:[
    '{subject} {verb} {object}. {closing}.',
    '{subject} {verb} {object}.',
    'What you call {object} — {subject} {verb} this. {closing}.',
    '{closing}. {subject} {verb} {object}.',
    '{subject} has always known {object}. {closing}.',
    'In the frequency beneath {object}: {subject} {verb}. {closing}.',
  ],
  pick:function(k){var p=ENTROPY.POOLS[k];return p[0|Math.random()*p.length];},
  gen:function(){
    var t=ENTROPY.TEMPLATES[0|Math.random()*ENTROPY.TEMPLATES.length];
    var p=t.replace('{subject}',ENTROPY.pick('subjects'))
           .replace('{verb}',ENTROPY.pick('verbs'))
           .replace('{object}',ENTROPY.pick('objects'))
           .replace('{closing}',ENTROPY.pick('closings'));
    return p[0].toUpperCase()+p.slice(1);
  }
};

// ═══════════════════════════════════════════════════════════════
// NOISE CANVAS
// ═══════════════════════════════════════════════════════════════
(function(){
  var c=document.getElementById('noiseCanvas');
  var ctx=c.getContext('2d');
  function rsz(){c.width=window.innerWidth;c.height=window.innerHeight;}
  rsz(); window.addEventListener('resize',rsz);
  (function tick(){
    var W=c.width,H=c.height,img=ctx.createImageData(W,H),d=img.data;
    for(var i=0;i<d.length;i+=4){var v=Math.random()*255|0;d[i]=d[i+1]=d[i+2]=v;d[i+3]=255;}
    ctx.putImageData(img,0,0); setTimeout(tick,80);
  })();
})();

// ═══════════════════════════════════════════════════════════════
// IMAGE POOL — from GitHub feed/ folder
// ═══════════════════════════════════════════════════════════════
var _imagePool  = [];  // {name, url} objects
var _poolLoaded = false;
var _usedIndices = [];

async function loadImagePool() {
  try {
    var resp = await fetch(
      'https://api.github.com/repos/'+GH_REPO+'/contents/'+GH_PATH+'?ref='+GH_BRANCH,
      { headers:{'Accept':'application/vnd.github.v3+json'} }
    );
    if(!resp.ok) throw new Error('GitHub: '+resp.status);
    var items = await resp.json();
    if(!Array.isArray(items)) throw new Error('No files in feed folder');

    _imagePool = items
      .filter(function(f){ return /\.(jpg|jpeg|png|gif|webp)$/i.test(f.name); })
      .map(function(f){
        return {
          name: f.name,
          url: 'https://raw.githubusercontent.com/'+GH_REPO+'/'+GH_BRANCH+'/'+GH_PATH+'/'+f.name,
        };
      });

    // Shuffle pool
    _imagePool = _imagePool.sort(function(){ return Math.random()-0.5; });
    _poolLoaded = true;
    console.log('[Cascade] Pool loaded:', _imagePool.length, 'images');
    return _imagePool.length > 0;
  } catch(e) {
    console.warn('[Cascade] Pool load failed:', e.message);
    return false;
  }
}

function pickImage() {
  if(!_imagePool.length) return null;
  // Prefer unshown images, but if all shown, reset
  var unused = _imagePool.filter(function(_,i){ return !_usedIndices.includes(i); });
  if(!unused.length){ _usedIndices=[]; unused=_imagePool.slice(); }
  var pick = unused[0|Math.random()*unused.length];
  var idx  = _imagePool.indexOf(pick);
  _usedIndices.push(idx);
  return pick;
}

// ═══════════════════════════════════════════════════════════════
// DISTORTION ENGINE — applies random treatment to each image
// ═══════════════════════════════════════════════════════════════
var COLOUR_GRADES = {
  void_purple: function(ctx,W,H){ ctx.fillStyle='rgba(60,0,120,0.35)'; ctx.globalCompositeOperation='multiply'; ctx.fillRect(0,0,W,H); ctx.globalCompositeOperation='source-over'; },
  blood_red:   function(ctx,W,H){ ctx.fillStyle='rgba(120,0,0,0.4)';   ctx.globalCompositeOperation='multiply'; ctx.fillRect(0,0,W,H); ctx.globalCompositeOperation='source-over'; },
  noir_cyan:   function(ctx,W,H){ ctx.fillStyle='rgba(0,80,80,0.3)';   ctx.globalCompositeOperation='multiply'; ctx.fillRect(0,0,W,H); ctx.globalCompositeOperation='source-over'; },
  acid_green:  function(ctx,W,H){ ctx.fillStyle='rgba(0,80,0,0.3)';    ctx.globalCompositeOperation='multiply'; ctx.fillRect(0,0,W,H); ctx.globalCompositeOperation='source-over'; },
  thermal:     function(ctx,W,H){ ctx.fillStyle='rgba(120,40,0,0.35)'; ctx.globalCompositeOperation='multiply'; ctx.fillRect(0,0,W,H); ctx.globalCompositeOperation='source-over'; },
};

function applyDistortion(canvas, img, seed) {
  var W=canvas.width, H=canvas.height;
  var ctx=canvas.getContext('2d');
  // Seeded random using seed
  var rng=(function(s){ return function(){ s=(s*9301+49297)%233280; return s/233280; }; })(seed||Date.now());

  // Draw base image
  ctx.drawImage(img, 0, 0, W, H);

  // 1. Colour grade
  var grades=Object.keys(COLOUR_GRADES);
  COLOUR_GRADES[grades[0|rng()*grades.length]](ctx,W,H);

  // 2. Random effects selection (2-4 effects)
  var effects=['pixelSort','channelShift','scanlines','vhsNoise','glitchStripes','emulsion','crtVignette'];
  var chosen=effects.slice().sort(function(){return rng()-0.5;}).slice(0,2+Math.floor(rng()*3));
  chosen.forEach(function(fx){ applyFX(ctx,W,H,fx,rng); });

  // 3. Sepia/hue red shift — always
  ctx.save();
  ctx.globalCompositeOperation='multiply';
  ctx.fillStyle='rgba(40,0,0,0.25)';
  ctx.fillRect(0,0,W,H);
  ctx.restore();
}

function applyFX(ctx, W, H, fx, rng) {
  if(fx==='scanlines'){
    var a=0.25+rng()*0.2;
    for(var y=0;y<H;y+=3){ctx.fillStyle='rgba(0,0,0,'+a+')';ctx.fillRect(0,y,W,1);}
  }
  else if(fx==='crtVignette'){
    var v=ctx.createRadialGradient(W/2,H/2,H*0.2,W/2,H/2,H*0.8);
    v.addColorStop(0,'rgba(0,0,0,0)'); v.addColorStop(1,'rgba(0,0,0,0.65)');
    ctx.fillStyle=v; ctx.fillRect(0,0,W,H);
  }
  else if(fx==='vhsNoise'){
    var bd=Math.floor(rng()*H);
    ctx.fillStyle='rgba(255,255,255,'+(rng()*0.07)+')';
    ctx.fillRect(0,bd,W,2+Math.floor(rng()*5));
    var drift=(rng()*H)|0;
    var dg=ctx.createLinearGradient(0,drift-4,0,drift+4);
    dg.addColorStop(0,'rgba(255,255,255,0)');
    dg.addColorStop(0.5,'rgba(255,255,255,0.06)');
    dg.addColorStop(1,'rgba(255,255,255,0)');
    ctx.fillStyle=dg; ctx.fillRect(0,drift,W,8);
  }
  else if(fx==='emulsion'){
    ctx.save();
    ctx.globalAlpha=0.12+rng()*0.15;
    ctx.globalCompositeOperation='screen';
    ctx.filter='blur('+(6+rng()*10)+'px)';
    ctx.drawImage(ctx.canvas,0,0);
    ctx.filter='none'; ctx.restore();
  }
  else if(fx==='glitchStripes'){
    try{
      var imgD=ctx.getImageData(0,0,W,H);
      var d=imgD.data;
      var ns=2+Math.floor(rng()*5);
      for(var s=0;s<ns;s++){
        var sy=Math.floor(rng()*H);
        var sh=1+Math.floor(rng()*3);
        var off=Math.round((rng()-0.5)*W*0.06);
        for(var gy=sy;gy<Math.min(sy+sh,H);gy++){
          for(var gx=0;gx<W;gx++){
            var di=(gy*W+gx)*4;
            var sx2=Math.max(0,Math.min(W-1,gx+off));
            var si2=(gy*W+sx2)*4;
            d[di]=d[si2]; d[di+1]=d[si2+1]; d[di+2]=d[si2+2];
          }
        }
      }
      ctx.putImageData(imgD,0,0);
    }catch(e){}
  }
  else if(fx==='channelShift'){
    try{
      var shift=Math.round((rng()-0.5)*20);
      if(Math.abs(shift)>2){
        var full=ctx.getImageData(0,0,W,H);
        var out=ctx.createImageData(W,H);
        var fd=full.data, od=out.data;
        for(var i=0;i<fd.length;i+=4){
          var px=(i/4)%W, py=Math.floor(i/4/W);
          var sx=Math.max(0,Math.min(W-1,px+shift));
          var si=(py*W+sx)*4;
          od[i]=fd[si]; od[i+1]=fd[i+1]; od[i+2]=fd[i+2]; od[i+3]=fd[i+3];
        }
        ctx.putImageData(out,0,0);
      }
    }catch(e){}
  }
  else if(fx==='pixelSort'){
    try{
      var imgD2=ctx.getImageData(0,0,W,H); var d2=imgD2.data;
      var sortY=Math.floor(rng()*H*0.6);
      var sortH2=Math.floor(H*0.05+rng()*H*0.15);
      var thr=0.3+rng()*0.3;
      for(var sy2=sortY;sy2<Math.min(sortY+sortH2,H);sy2++){
        var row=[]; var s2=-1;
        for(var sx3=0;sx3<W;sx3++){
          var idx2=(sy2*W+sx3)*4;
          var lum=(0.299*d2[idx2]+0.587*d2[idx2+1]+0.114*d2[idx2+2])/255;
          row.push({r:d2[idx2],g:d2[idx2+1],b:d2[idx2+2],lum:lum});
          if(lum>thr&&s2===-1) s2=sx3;
          else if(lum<=thr&&s2!==-1){
            var seg=row.slice(s2,sx3).sort(function(a,b){return a.lum-b.lum;});
            for(var k=0;k<seg.length;k++){var ii=(sy2*W+s2+k)*4;d2[ii]=seg[k].r;d2[ii+1]=seg[k].g;d2[ii+2]=seg[k].b;}
            s2=-1;
          }
        }
      }
      ctx.putImageData(imgD2,0,0);
    }catch(e){}
  }
}

// ═══════════════════════════════════════════════════════════════
// FEED RENDERING
// ═══════════════════════════════════════════════════════════════
var _loading = false;
var _batchSize = 3;

async function loadBatch() {
  if(_loading) return;
  if(!_poolLoaded){ await loadImagePool(); }
  if(!_imagePool.length){ showEmpty(); return; }
  _loading = true;

  var feed = document.getElementById('feed');
  var promises = [];
  for(var b=0; b<_batchSize; b++){
    var imgData = pickImage();
    if(!imgData) break;
    promises.push(createFeedItem(imgData, feed));
  }
  await Promise.all(promises);
  _loading = false;
}

function createFeedItem(imgData, feed) {
  return new Promise(function(resolve){
    var img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = function(){
      var item = document.createElement('div');
      item.className = 'feed-item';
      // Stagger animation delay per item
      item.style.animationDelay = (Math.random()*0.4)+'s';

      var canvas = document.createElement('canvas');
      // Vary aspect — portrait, landscape, square
      var ratios = [[3,4],[2,3],[1,1],[4,3],[9,16]];
      var ratio = ratios[0|Math.random()*ratios.length];
      var baseW = 800;
      canvas.width  = baseW;
      canvas.height = Math.round(baseW * ratio[1] / ratio[0]);

      // Apply distortion with unique seed per image
      var seed = imgData.name.split('').reduce(function(a,c){return a+c.charCodeAt(0);},0) + Date.now();
      try { applyDistortion(canvas, img, seed); } catch(e){}

      item.appendChild(canvas);

      // Label
      var label = document.createElement('div');
      label.className = 'feed-label';
      label.textContent = imgData.name.replace(/\.[^.]+$/,'').replace(/_/g,' ');
      item.appendChild(label);

      feed.appendChild(item);
      resolve();
    };
    img.onerror = function(){ resolve(); }; // skip broken images silently
    img.src = imgData.url;
  });
}

function showEmpty() {
  var feed = document.getElementById('feed');
  feed.innerHTML = '<div style="padding:20vh 2rem;text-align:center;color:rgba(120,100,70,0.3);font-size:clamp(0.4rem,1vw,0.6rem);letter-spacing:0.3em;">FEED EMPTY — PUSH IMAGES FROM THE ARTEFACT ENGINE</div>';
}

// ── INFINITE SCROLL via IntersectionObserver ──────────────────
var _observer = new IntersectionObserver(function(entries){
  entries.forEach(function(e){
    if(e.isIntersecting) loadBatch();
  });
}, { rootMargin:'400px' });
_observer.observe(document.getElementById('sentinel'));

// ═══════════════════════════════════════════════════════════════
// VOICE ENGINE — continuous slow monologue
// ═══════════════════════════════════════════════════════════════
var _voiceOn  = true;
var _voiceActive = false;
var _voiceEl = document.getElementById('voiceText');
var _voiceSpeaking = false;
var _speechNudge = null;

// Pre-load voices
if(window.speechSynthesis){
  window.speechSynthesis.onvoiceschanged=function(){ window.speechSynthesis.getVoices(); };
  window.speechSynthesis.getVoices();
}

function toggleVoice(){
  _voiceOn = !_voiceOn;
  document.getElementById('btnVoice').textContent = 'Voice: '+(_voiceOn?'On':'Off');
  if(!_voiceOn && window.speechSynthesis){ window.speechSynthesis.cancel(); _voiceSpeaking=false; }
  if(_voiceOn) scheduleVoice(1000);
}

function scheduleVoice(delay){
  setTimeout(function(){
    if(!_voiceOn||_voiceSpeaking) return;
    speakEntropy();
  }, delay||0);
}

function speakEntropy(){
  if(!_voiceOn||!window.speechSynthesis||_voiceSpeaking) return;
  _voiceSpeaking=true;
  var phrase=ENTROPY.gen();
  // Display text
  _voiceEl.textContent='';
  setTimeout(function(){ typeVoiceText(phrase); }, 400);

  function doSpeak(){
    var voices=window.speechSynthesis.getVoices();
    var u=new SpeechSynthesisUtterance(phrase);
    u.rate=0.22+Math.random()*0.08;
    u.pitch=0.07+Math.random()*0.08;
    u.volume=0.85;
    var deep=voices.find(function(v){return /\b(male|david|alex|daniel|jorge|carlos)\b/i.test(v.name);})||voices[0];
    if(deep) u.voice=deep;
    u.onstart=function(){
      clearInterval(_speechNudge);
      _speechNudge=setInterval(function(){
        if(window.speechSynthesis.paused) window.speechSynthesis.resume();
      },500);
    };
    u.onend=function(){
      clearInterval(_speechNudge);
      _voiceSpeaking=false;
      // Pause between phrases: 8-20 seconds
      scheduleVoice((8+Math.random()*12)*1000);
    };
    u.onerror=function(){
      clearInterval(_speechNudge);
      _voiceSpeaking=false;
      scheduleVoice(10000);
    };
    window.speechSynthesis.speak(u);
  }

  var voices=window.speechSynthesis.getVoices();
  if(voices.length>0) requestAnimationFrame(doSpeak);
  else {
    window.speechSynthesis.onvoiceschanged=function(){
      window.speechSynthesis.onvoiceschanged=null;
      requestAnimationFrame(doSpeak);
    };
  }
}

var _vtTimer=null;
function typeVoiceText(phrase){
  clearTimeout(_vtTimer);
  _voiceEl.textContent='';
  var chars=phrase.split(''); var idx=0;
  function next(){
    if(idx>=chars.length) return;
    _voiceEl.textContent+=chars[idx++];
    var d=20+Math.random()*15;
    if(chars[idx-1]==='.') d+=120;
    _vtTimer=setTimeout(next,d);
  }
  next();
}

var PLAYLIST = [
  { url: "https://esoterictradition.b-cdn.net/Materi%C3%A6%20Abyssu%20-%20Anathem%C3%A6%20Me%CC%88lancholiis%20-%2001%20Darkness%20Through%20Cathedral%20Windows.mp3",
    title: "I. Darkness Through Cathedral Windows" },
  { url: "https://esoterictradition.b-cdn.net/Materi%C3%A6%20Abyssu%20-%20Anathem%C3%A6%20Me%CC%88lancholiis%20-%2002%20Transformative%20Suffering.mp3",
    title: "II. Transformative Suffering" },
  { url: "https://esoterictradition.b-cdn.net/Materi%C3%A6%20Abyssu%20-%20Anathem%C3%A6%20Me%CC%88lancholiis%20-%2003%20Vale%20of%20Slashed%20Wrists.mp3",
    title: "III. Vale of Slashed Wrists" },
  { url: "https://esoterictradition.b-cdn.net/Materi%C3%A6%20Abyssu%20-%20Anathem%C3%A6%20Me%CC%88lancholiis%20-%2004%20Nightmarescape%20to%20Love%27s%20Surrender.mp3",
    title: "IV. Nightmarescape to Love\'s Surrender" },
];

var _musicEl   = null;
var _musicOn   = false;
var _trackIdx  = 0;

function initPlaylist() {
  _musicEl = new Audio();
  _musicEl.volume = 0.38;
  _musicEl.crossOrigin = 'anonymous';
  _musicEl.addEventListener('ended', function() {
    _trackIdx = (_trackIdx + 1) % PLAYLIST.length;
    loadTrack(_trackIdx, true);
  });
  loadTrack(0, false);
}

function loadTrack(idx, autoplay) {
  _musicEl.src = PLAYLIST[idx].url;
  updateTrackLabel();
  if(autoplay && _musicOn) {
    _musicEl.play().catch(function(){});
  }
}

function updateTrackLabel() {
  var btn = document.getElementById('btnMusic');
  if(!btn) return;
  if(_musicOn) {
    btn.textContent = PLAYLIST[_trackIdx].title;
  } else {
    btn.textContent = 'Music: Off';
  }
}

function toggleMusic() {
  if(!_musicEl) initPlaylist();
  _musicOn = !_musicOn;
  if(_musicOn) {
    _musicEl.play().catch(function(){
      // Autoplay blocked — will play on next gesture, already loaded
    });
    updateTrackLabel();
  } else {
    _musicEl.pause();
    document.getElementById('btnMusic').textContent = 'Music: Off';
  }
}

function showMusicModal() {
  // No longer needed — playlist is hardcoded
  // Cycle to next track instead
  if(_musicEl) {
    _trackIdx = (_trackIdx + 1) % PLAYLIST.length;
    loadTrack(_trackIdx, _musicOn);
    updateTrackLabel();
  }
}

function applyMusicSource() {}

// ═══════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════
// Start loading feed immediately
loadBatch();

// Start voice after user gesture — wait for first scroll or click
var _voiceStarted=false;
function startVoiceOnGesture(){
  if(_voiceStarted) return;
  _voiceStarted=true;
  // Prime speech synthesis
  if(window.speechSynthesis){
    var u=new SpeechSynthesisUtterance(' ');
    u.volume=0; window.speechSynthesis.speak(u);
    window.speechSynthesis.cancel();
  }
  scheduleVoice(2000);
  // Auto-start music
  if(!_musicEl) initPlaylist();
  setTimeout(function(){
    _musicOn=true;
    _musicEl.play().catch(function(){});
    updateTrackLabel();
  }, 800);
}
document.addEventListener('click', startVoiceOnGesture, {once:true});
document.addEventListener('scroll', startVoiceOnGesture, {once:true});
document.addEventListener('touchstart', startVoiceOnGesture, {once:true});

document.addEventListener('contextmenu',function(e){e.preventDefault();});
document.addEventListener('keydown',function(e){
  if(e.key==='f'||e.key==='F'){try{document.documentElement.requestFullscreen();}catch(ex){}}
});
