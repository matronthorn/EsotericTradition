  if(!amt||amt<=0) return text;
  var r='';
  for(var i=0;i<text.length;i++){

function initAudio(){

    _masterDistort=AC.createWaveShaper();

    _masterReverb=AC.createConvolver(); _masterReverb.buffer=makeIR(AC,3.5,0.5);
    _masterDistort.connect(_masterReverb);
    _masterReverb.connect(_masterGain);

    _voiceDestGain.connect(_masterGain);

  }catch(e){console.warn('audio:',e);}
}
function makeDistCurve(a){
  var n=512,c=new Float32Array(n);
  for(var i=0;i<n;i++){var x=i*2/n-1;c[i]=(Math.PI+a)*x/(Math.PI+a*Math.abs(x));}
  return c;
}
function makeIR(ac,dur,dec){
  var sr=ac.sampleRate,len=Math.ceil(sr*dur),buf=ac.createBuffer(2,len,sr);
  for(var c=0;c<2;c++){var d=buf.getChannelData(c);for(var i=0;i<len;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/len,dec);}
  return buf;
}
function makeHallIR(ac){
  var sr=ac.sampleRate,dur=5.5,len=Math.ceil(sr*dur),buf=ac.createBuffer(2,len,sr);
  for(var c=0;c<2;c++){var d=buf.getChannelData(c);for(var i=0;i<len;i++){var t=i/sr;d[i]=(Math.random()*2-1)*Math.pow(1-t/dur,0.3)*(t<0.04?t/0.04:1);}}
  return buf;
}

async function searchIA(q,type){
  var url='https://archive.org/advancedsearch.php?q='+encodeURIComponent(q)+
          '&fl[]=identifier&rows=8&start='+Math.floor(Math.random()*50)+'&output=json';
  var r=await fetch(url); var d=await r.json();
  var docs=(d.response&&d.response.docs)||[];
  if(!docs.length) return null;
  return docs[0|Math.random()*docs.length].identifier;
}
async function getAudioURL(id){
  try{
    // Try /files endpoint first (returns {result:[...]})
    var r=await fetch('https://archive.org/metadata/'+id+'/files');
    var d=await r.json();
    var files=d.result||d.files||[];
    // Find audio file - prefer shorter files to load faster
    var audioFiles=files.filter(function(x){return x.name&&/\.(mp3|ogg|flac)$/i.test(x.name);});
    if(!audioFiles.length){
      // Fall back to full metadata
      var r2=await fetch('https://archive.org/metadata/'+id);
      var d2=await r2.json(); audioFiles=(d2.files||[]).filter(function(x){return x.name&&/\.(mp3|ogg)$/i.test(x.name);});
    }
    if(!audioFiles.length) return null;
    // Pick a random audio file from the item
    var f=audioFiles[0|Math.random()*audioFiles.length];
    return 'https://archive.org/download/'+id+'/'+f.name.replace(/ /g,'%20');
  }catch(e){return null;}
}
function launchStream(url,idx){
  if(!AC) return;
  try{
    var el=new Audio();
    el.src=url; el.crossOrigin='anonymous';
    el.loop=true; el.volume=1;
    el.playbackRate=0.3+Math.random()*1.2;
    el.play().catch(function(){});
    var src=AC.createMediaElementSource(el);
    var gain=AC.createGain(); gain.gain.value=0.03+Math.random()*0.06;
    src.connect(gain); gain.connect(_masterDistort);
    audioNodes.push({el:el,gain:gain,idx:idx});
    // Pitch wobble
    var ws=0.006+Math.random()*0.02, wd=0.04+Math.random()*0.12, wp=Math.random()*Math.PI*2;
    (function w(){
      el.playbackRate=(0.3+idx*0.07)+Math.sin(Date.now()*0.001*ws+wp)*wd;
      setTimeout(w,400+Math.random()*600);
    })();
  }catch(e){console.warn('stream failed:',url);}
}
function scheduleVolume(){
  if(!audioNodes.length) return;
  function shift(){
    _dominantIdx=0|Math.random()*audioNodes.length;
    audioNodes.forEach(function(n,i){
      var t=i===_dominantIdx?(0.28+Math.random()*0.42):(Math.random()>0.6?0.05+Math.random()*0.1:0.003+Math.random()*0.02);
      if(n.gain&&AC) n.gain.gain.linearRampToValueAtTime(t,AC.currentTime+2+Math.random()*5);
    });
    setTimeout(shift,(5+Math.random()*80)*1000);
  }
  shift();
}

var _capturedSpeech = null;
var _mediaRecorder = null;
var _recordChunks = [];

function doSpeak(phrase){
  if(!window.speechSynthesis||_voiceActive) return;
  _voiceActive=true;

  var u=new SpeechSynthesisUtterance(phrase);
  u.rate=0.20+Math.random()*0.12;
  u.pitch=0.07+Math.random()*0.10;
  u.volume=1.0;
  var vs=window.speechSynthesis.getVoices();
  var dv=vs.find(function(v){return/male|david|alex|daniel|jorge/i.test(v.name);})||vs[0];
  if(dv) u.voice=dv;

  var zi=Math.random()>0.45?(0.25+Math.random()*0.65):0;
  displayText(phrase,zi);

  // Hall reverb routing + capture for pitch-down duplicate
  try{
    var dest=AC.createMediaStreamDestination();
    var vsrc=AC.createMediaStreamSource(dest.stream);
    var vrev=AC.createConvolver(); vrev.buffer=makeHallIR(AC);
    var vgain=AC.createGain(); vgain.gain.value=0.9;
    var vdist=AC.createWaveShaper(); vdist.curve=makeDistCurve(35);
    vsrc.connect(vdist); vdist.connect(vrev); vrev.connect(vgain); vgain.connect(_voiceDestGain);
    u.output=dest;

    // Record the stream for pitch-down replay
    try{
      _recordChunks=[];
      _mediaRecorder=new MediaRecorder(dest.stream);
      _mediaRecorder.ondataavailable=function(e){ if(e.data.size>0) _recordChunks.push(e.data); };
      _mediaRecorder.onstop=function(){
        var blob=new Blob(_recordChunks,{type:'audio/webm'});
        var burl=URL.createObjectURL(blob);
        playPitchDownCopy(burl);
      };
      _mediaRecorder.start();
    }catch(e){}
  }catch(e){}

  u.onend=function(){
    _voiceActive=false;
    try{ if(_mediaRecorder&&_mediaRecorder.state==='recording') _mediaRecorder.stop(); }catch(e){}
  };
  u.onerror=function(){
    _voiceActive=false;
    try{ if(_mediaRecorder&&_mediaRecorder.state==='recording') _mediaRecorder.stop(); }catch(e){}
  };
  window.speechSynthesis.speak(u);
}

function playPitchDownCopy(blobUrl){
  // -4 octaves = playback rate of 1/16 (2^4 = 16)
  // We play at 1/16 speed after a short delay
  try{
    var el=new Audio(blobUrl);
    el.crossOrigin='anonymous';
    el.playbackRate=0.0625; // 1/16 = -4 octaves
    el.volume=1.0;
    // Route through AudioContext: deep reverb + slight distort
    var src=AC.createMediaElementSource(el);
    var deepRev=AC.createConvolver(); deepRev.buffer=makeHallIR(AC);
    var deepGain=AC.createGain(); deepGain.gain.value=0.65;
    var deepDist=AC.createWaveShaper(); deepDist.curve=makeDistCurve(80);
    src.connect(deepDist); deepDist.connect(deepRev); deepRev.connect(deepGain); deepGain.connect(_masterGain);
    el.onended=function(){ try{URL.revokeObjectURL(blobUrl);}catch(e){} };
    // Start with a slight delay so it doesn't overlap the normal voice start
    setTimeout(function(){ el.play().catch(function(){}); }, 800);
  }catch(e){ console.warn('pitch-down failed:',e); }
}

var GH_BRANCH = 'main';
var GH_API = 'https://api.github.com/repos/' + GH_REPO + '/contents/';
var GH_RAW = 'https://raw.githubusercontent.com/' + GH_REPO + '/' + GH_BRANCH + '/';

var _ghVideos = [];    // video URLs discovered from repo
var _ghImages = [];    // image URLs discovered from repo
var _ghLoaded = false;

async function loadGithubAssets(path) {
  // Recursively fetch file list from GitHub Contents API
  // Works for flat repos and subdirectories
  path = path || '';
  var videos = [], images = [];
  try {
    var resp = await fetch(GH_API + path + '?ref=' + GH_BRANCH, {
      headers: { 'Accept': 'application/vnd.github.v3+json' }
    });
    if (!resp.ok) throw new Error('GitHub API: ' + resp.status);
    var items = await resp.json();
    if (!Array.isArray(items)) return { videos:[], images:[] };

    for (var i = 0; i < items.length; i++) {
      var item = items[i];
      if (item.type === 'dir') {
        // Recurse into subdirectories
        var sub = await loadGithubAssets(item.path + '/');
        videos = videos.concat(sub.videos);
        images = images.concat(sub.images);
      } else if (item.type === 'file') {
        var name = item.name.toLowerCase();
        var rawUrl = GH_RAW + item.path;
        if (/\.(mp4|webm|mov|avi|mkv)$/.test(name)) {
          videos.push(rawUrl);
        } else if (/\.(jpg|jpeg|png|gif|webp)$/.test(name)) {
          images.push(rawUrl);
        }
      }
    }
  } catch(e) {
    console.warn('GitHub asset load failed:', e.message);
  }
  return { videos: videos, images: images };
}

async function initGithubAssets() {
  var assets = await loadGithubAssets();
  _ghVideos = assets.videos;
  _ghImages = assets.images;
  _ghLoaded = true;
  console.log('[Hell Void] GitHub assets:', _ghVideos.length, 'videos,', _ghImages.length, 'images');

  // Immediately load GitHub videos into some slots
  if (_ghVideos.length > 0) {
    // Replace 3 random slots with GitHub content immediately
    var slots = _videoSlots.slice().sort(function(){ return Math.random()-0.5; }).slice(0,3);
    slots.forEach(function(slot) { loadGithubVideoInSlot(slot); });
  }

  // Add GitHub images to drift layer
  if (_ghImages.length > 0) {
    var toAdd = Math.min(_ghImages.length, 6);
    for (var i = 0; i < toAdd; i++) {
      addImg(_ghImages[0|Math.random()*_ghImages.length]);
    }
  }
}

function loadGithubVideoInSlot(slot) {
  if (!_ghVideos.length) return;
  var url = _ghVideos[0|Math.random()*_ghVideos.length];
  slot.innerHTML = '';

  var video = document.createElement('video');
  video.src = url;
  video.autoplay = true;
  video.loop = true;
  video.muted = true; // required for Chrome autoplay
  video.playsInline = true;
  video.setAttribute('playsinline', '');
  // Random slow playback for dreamlike quality
  video.playbackRate = 0.25 + Math.random() * 0.65;

  video.style.cssText = [
    'position:absolute',
    'width:210%','height:210%',
    'top:-55%','left:-55%',
    'object-fit:cover',
    'pointer-events:none',
    'opacity:0',
    'transition:opacity 4s ease',
  ].join(';');

  video.oncanplay = function() {
    setTimeout(function(){ video.style.opacity = '1'; }, 300);
    video.play().catch(function(){});
  };

  // Force visible after 5s regardless
  setTimeout(function(){ video.style.opacity = '1'; }, 5000);

  slot.appendChild(video);
}

// ── MODIFY loadVideo to mix in GitHub content ─────────────────
// About 35% of slots use GitHub videos when available
var _origLoadVideo = null; // store reference to patch below

function initVideo(){
  var layer=document.getElementById('videoLayer');
  var blends=['normal','screen','overlay','hard-light','multiply','difference'];
  for(var i=0;i<9;i++){
    var div=document.createElement('div');
    div.className='vframe';
    div.style.opacity=(0.35+Math.random()*0.55).toString();
    div.style.filter='contrast('+(1.3+Math.random()*1.4)+') brightness('+(0.25+Math.random()*0.55)+') saturate('+(0.4+Math.random()*1.8)+')';
    div.style.mixBlendMode=blends[0|Math.random()*blends.length];
    div.style.transform='scale('+(1.15+Math.random()*0.5)+') rotate('+(Math.random()*6-3)+'deg)';
    layer.appendChild(div);
    _videoSlots.push(div);
    loadVideo(div);
  }
  // Load GitHub assets (auto-discovers repo contents)
  initGithubAssets();
  setInterval(function(){
    var i=0|Math.random()*_videoSlots.length;loadVideo(_videoSlots[i]);
  },20000);
  setInterval(function(){
    var i=0|Math.random()*_videoSlots.length;loadVideo(_videoSlots[i]);
  },31000);
  // Dedicated GitHub slot refresh — always shows latest repo content
  setInterval(function(){
    if(_ghVideos.length>0){
      var i=0|Math.random()*_videoSlots.length;
      loadGithubVideoInSlot(_videoSlots[i]);
    }
  },25000);;
}
async function loadVideo(slot){
  // 35% chance: use GitHub video if available
  if(_ghLoaded && _ghVideos.length > 0 && Math.random() < 0.35){
    loadGithubVideoInSlot(slot);
    return;
  }
  var id;
  if(Math.random()>0.35){
    id=IA_VIDEO_IDS[0|Math.random()*IA_VIDEO_IDS.length];
  }else{
    var qs=['subject:(psychiatric+hospital)+mediatype:movies',
            'subject:(evangelical+revival)+mediatype:movies',
            'subject:(surgery+medical+educational)+mediatype:movies',
            'subject:(atomic+nuclear+war)+mediatype:movies',
            'subject:(horror)+mediatype:movies+year:[1920+TO+1975]',
            'collection:(prelinger)+mediatype:movies',
            'subject:(exploitation+film)+mediatype:movies',
            'subject:(propaganda)+mediatype:movies'];
    try{id=await searchIA(qs[(_vsearchIdx++)%qs.length],'movies');}catch(e){}
    if(!id) id=IA_VIDEO_IDS[0|Math.random()*IA_VIDEO_IDS.length];
  }
  slot.innerHTML='';
  var f=document.createElement('iframe');
  f.src='https://archive.org/embed/'+id+'?autoplay=1&start='+Math.floor(Math.random()*500);
  f.setAttribute('allow','autoplay; fullscreen');
  f.setAttribute('frameborder','0');
  f.setAttribute('scrolling','no');
  f.style.cssText='position:absolute;width:210%;height:210%;top:-55%;left:-55%;border:none;pointer-events:none;opacity:0;transition:opacity 5s ease;';
  // Start invisible
  f.style.opacity='0';
  f.style.transition='opacity 6s ease';
  // Force visible after 8s regardless of onload (IA embeds are unreliable)
  var forceTimer = setTimeout(function(){ f.style.opacity='1'; }, 8000);
  f.onload=function(){
    clearTimeout(forceTimer);
    setTimeout(function(){ f.style.opacity='1'; }, 500);
  };
  slot.appendChild(f);
}

// IMAGES — anatomical / figure / medical
// ════════════════════════════════════════════════════════════════
function initImages(){
  _imageLayer=document.getElementById('imageLayer');
  loadImages();
  setInterval(loadImages,10000);
  requestAnimationFrame(animImages);
}
async function loadImages(){
  var cat=WIKI_CATS[0|Math.random()*WIKI_CATS.length];
  try{
    var url='https://commons.wikimedia.org/w/api.php?action=query&list=categorymembers&cmtitle=Category:'+encodeURIComponent(cat)+'&cmlimit=20&cmtype=file&format=json&origin=*';
    var r=await fetch(url); var d=await r.json();
    var ms=(d.query&&d.query.categorymembers)||[];
    if(!ms.length) return;
    var titles=ms.slice(0,8).map(function(m){return m.title;}).join('|');
    var ir=await fetch('https://commons.wikimedia.org/w/api.php?action=query&titles='+encodeURIComponent(titles)+'&prop=imageinfo&iiprop=url&iiurlwidth=700&format=json&origin=*');
    var id=await ir.json();
    Object.values((id.query&&id.query.pages)||{}).forEach(function(p){
      var info=p.imageinfo&&p.imageinfo[0];
      if(info&&info.thumburl) addImg(info.thumburl);
    });
  }catch(e){}
}
function addImg(src){
  var img=new Image(); img.crossOrigin='anonymous';
  img.onload=function(){
    var el=document.createElement('img');
    el.src=src;
    var sz=150+Math.random()*400;
    var blends=['screen','overlay','hard-light','color-dodge','lighten','difference'];
    el.style.cssText=[
      'position:absolute','width:'+sz+'px',
      'left:'+(Math.random()*90+5)+'%',
      'top:'+(Math.random()*90+5)+'%',
      'transform:translate(-50%,-50%) rotate('+(Math.random()*40-20)+'deg)',
      'mix-blend-mode:'+blends[0|Math.random()*blends.length],
      'opacity:0','transition:opacity 3s ease','pointer-events:none',
      'filter:contrast('+(1.4+Math.random()*0.9)+') brightness('+(0.45+Math.random()*0.65)+') saturate('+(0.2+Math.random()*1.2)+')',
    ].join(';');
    _imageLayer.appendChild(el);
    var base=0.20+Math.random()*0.38;
    _driftImages.push({
      el:el,vx:(Math.random()-0.5)*0.02,vy:(Math.random()-0.5)*0.02,
      x:parseFloat(el.style.left),y:parseFloat(el.style.top),
      base:base,life:18000+Math.random()*35000,born:Date.now()
    });
    setTimeout(function(){el.style.opacity=base.toString();},300);
    if(_driftImages.length>35){
      var old=_driftImages.shift();
      old.el.style.opacity='0';
      setTimeout(function(){try{old.el.parentNode.removeChild(old.el);}catch(e){}},4000);
    }
  };
  img.src=src;
}
function animImages(){
  var now=Date.now();
  var pulse=(Math.sin(_organicPulse*0.75)+1)/2;
  _driftImages.forEach(function(d){
    d.x+=d.vx; d.y+=d.vy;
    if(d.x<3){d.x=3;d.vx=Math.abs(d.vx);}
    if(d.x>97){d.x=97;d.vx=-Math.abs(d.vx);}
    if(d.y<3){d.y=3;d.vy=Math.abs(d.vy);}
    if(d.y>97){d.y=97;d.vy=-Math.abs(d.vy);}
    d.el.style.left=d.x+'%'; d.el.style.top=d.y+'%';
    var age=now-d.born;
    var lf=age>d.life-6000?Math.max(0,(d.life-age)/6000):1;
    // Pulsating throb — tied to organic pulse
    var throb=d.base*(0.55+pulse*0.45)*lf;
    d.el.style.opacity=throb.toString();
    // Scale throb
    var sc=1.0+Math.sin(_organicPulse*1.1+d.born*0.00008)*0.10;
    d.el.style.transform=d.el.style.transform.replace(/\s*scale\([^)]+\)/,'')
      +' scale('+sc+')';
  });
  requestAnimationFrame(animImages);
}

// ════════════════════════════════════════════════════════════════
// ORGANIC PULSE — drives pulsating throb throughout
// ════════════════════════════════════════════════════════════════
function startOrganicPulse(){
  function tick(){
    _organicPulse+=0.016+Math.sin(_organicPulse*0.07)*0.006;
    // Video layer filter pulse
    var vl=document.getElementById('videoLayer');
    if(vl){
      var vp=(Math.sin(_organicPulse*0.55)+1)/2;
      vl.style.filter='brightness('+(0.5+vp*0.5)+') saturate('+(1+vp*1.2)+') contrast('+(1+vp*0.4)+')';
    }
    requestAnimationFrame(tick);
  }
  tick();
}

// VOID CANVAS
// ════════════════════════════════════════════════════════════════
function initVoidCanvas(){
  var c=document.getElementById('voidCanvas');
  _voidCtx=c.getContext('2d');
  c.width=window.innerWidth; c.height=window.innerHeight;
  window.addEventListener('resize',function(){c.width=window.innerWidth;c.height=window.innerHeight;});
  (function av(){drawVoid();requestAnimationFrame(av);})();
}
function drawVoid(){
  if(!_voidCtx) return;
  var W=window.innerWidth,H=window.innerHeight,cx=W/2,cy=H/2;
  var maxR=Math.max(W,H)*0.76;
  _voidCtx.clearRect(0,0,W,H);
  // Primary void
  var g=_voidCtx.createRadialGradient(cx,cy,0,cx,cy,maxR);
  g.addColorStop(0,'rgba(0,0,0,1)');
  g.addColorStop(0.22,'rgba(0,0,0,0.99)');
  g.addColorStop(0.28,'rgba(0,0,0,0.97)');
  g.addColorStop(0.34,'rgba(0,0,0,0.88)');
  g.addColorStop(0.42,'rgba(0,0,0,0.62)');
  g.addColorStop(0.52,'rgba(0,0,0,0.35)');
  g.addColorStop(0.65,'rgba(0,0,0,0.14)');
  g.addColorStop(0.82,'rgba(0,0,0,0.04)');
  g.addColorStop(1.0,'rgba(0,0,0,0)');
  _voidCtx.fillStyle=g; _voidCtx.fillRect(0,0,W,H);
  // Pulsing dark ring at void boundary
  var rr=Math.min(W,H)*(0.30+Math.sin(_organicPulse*0.65)*0.035);
  var rg=_voidCtx.createRadialGradient(cx,cy,rr*0.65,cx,cy,rr*1.2);
  var ra=0.25+Math.sin(_organicPulse*1.4)*0.18;
  rg.addColorStop(0,'rgba(50,0,0,0)');
  rg.addColorStop(0.5,'rgba(30,0,0,'+ra+')');
  rg.addColorStop(1,'rgba(0,0,0,0)');
  _voidCtx.fillStyle=rg; _voidCtx.fillRect(0,0,W,H);
  // Edge vignette
  var eg=_voidCtx.createRadialGradient(cx,cy,maxR*0.5,cx,cy,maxR);
  eg.addColorStop(0,'rgba(0,0,0,0)');
  eg.addColorStop(1,'rgba(0,0,0,0.80)');
  _voidCtx.fillStyle=eg; _voidCtx.fillRect(0,0,W,H);
}

function initNoiseCanvas(){
  var c=document.getElementById('noiseCanvas');

  c.width=window.innerWidth; c.height=window.innerHeight;
  window.addEventListener('resize',function(){c.width=window.innerWidth;c.height=window.innerHeight;});
  (function n(){
    var W=c.width,H=c.height,d=_noiseCtx.createImageData(W,H),p=d.data;
    for(var i=0;i<p.length;i+=4){var v=Math.random()*255|0;p[i]=p[i+1]=p[i+2]=v;p[i+3]=255;}
    _noiseCtx.putImageData(d,0,0);
    setTimeout(n,55);
  })();
}

var ZU_='̍̎̄̅̿̑̆̐͒͗͑̇̈̊͂̓̈͊͋͌̃̂̌͐̀́̋̏̒'.split('');
var ZM_='̴̵̶̸̷̡̢̧̨̛̀́̕͘͜͟͢͝͞͠͡'.split('');
var ZD_='̖̗̘̙̜̝̞̟̠̤̥̦̩̪̫̬̭̮̯̰̱̲̳̹̺̻̼͇͈͉͍͎͓͔͕͖͙͚ͅ'.split('');
function zg(txt,a){
  if(!a||a<=0) return txt;
  var r='';
  for(var i=0;i<txt.length;i++){
    r+=txt[i];
    for(var u=0|Math.random()*a*8;u--;) r+=ZU_[0|Math.random()*ZU_.length];
    if(Math.random()<a*0.5) r+=ZM_[0|Math.random()*ZM_.length];
    for(var d=0|Math.random()*a*6;d--;) r+=ZD_[0|Math.random()*ZD_.length];
  }
  return r;
}
function initText(){_textEl=document.getElementById('voidText');}
function displayText(phrase,zi){
  if(!_textEl) return;
  clearTimeout(_typeTimer);
  _textEl.innerHTML='';
  var words=phrase.split(' ');
  var disp=words.map(function(w){return zi>0&&Math.random()>0.35?zg(w,zi):w;}).join(' ');
  var chars=disp.split('');
  var delay_=0;
  chars.forEach(function(ch){
    var s=document.createElement('span');
    s.textContent=ch; _textEl.appendChild(s);
    delay_+=40+Math.random()*80;
    (function(sp,d){setTimeout(function(){sp.style.opacity='1';},d);})(s,delay_);
  });
  _typeTimer=setTimeout(function(){
    _textEl.querySelectorAll('span').forEach(function(s){s.style.opacity='0';});
    setTimeout(function(){if(_textEl)_textEl.innerHTML='';},1200);
  },delay_+5000);
}
